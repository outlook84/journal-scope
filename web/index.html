<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="%BASE_URL%favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" crossorigin="use-credentials" />
    <link rel="apple-touch-icon" href="%BASE_URL%icons/apple-touch-icon.png" />
    <meta name="theme-color" content="#0b1326" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <script>
      (() => {
        const storageKey = "journal-scope:theme"
        const colors = { light: "#f0f3fa", dark: "#0b1326" }
        let storedMode = null
        try {
          storedMode = window.localStorage.getItem(storageKey)
        } catch {
          storedMode = null
        }
        const mode = storedMode === "light" || storedMode === "dark" || storedMode === "system" ? storedMode : "system"
        const systemPrefersDark = window.matchMedia?.("(prefers-color-scheme: dark)")?.matches ?? false
        const systemTheme = systemPrefersDark ? "dark" : "light"
        const resolvedTheme = mode === "system" ? systemTheme : mode
        const themeColorMeta = document.querySelector('meta[name="theme-color"]')

        document.documentElement.dataset.theme = resolvedTheme
        document.documentElement.dataset.themePreference = mode
        document.documentElement.classList.toggle("dark", resolvedTheme === "dark")
        themeColorMeta?.setAttribute("content", colors[resolvedTheme])
      })()
    </script>
    <title>Journal Scope</title>
  </head>
  <body class="bg-background text-on-surface font-sans overflow-hidden h-screen flex flex-col">
    <div id="root" class="h-full w-full flex flex-col"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
