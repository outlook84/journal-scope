version: 2

project_name: journal-scope

builds:
  - id: journal-scope
    main: ./cmd/journal-scope
    binary: journal-scope
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X journal-scope.Version={{ .Tag }}

archives:
  - id: binaries
    ids:
      - journal-scope
    name_template: "journal-scope-{{ .Tag }}-{{ .Os }}-{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

release:
  prerelease: auto

dockers_v2:
  - id: journal-scope-image
    dockerfile: Dockerfile.release
    ids:
      - journal-scope
    images:
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY }}"
    tags:
      - "{{ .Tag }}"
      - "{{ .Major }}.{{ .Minor }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
